apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: course-select
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: course-backend:latest
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://postgres:postgres@postgres-svc:5432/course_select
            - name: REDIS_URL
              value: redis://redis-svc:6379/0
            - name: SECRET_KEY
              value: k8s-dev-secret-key
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: course-select
spec:
  selector:
    app: backend
  ports:
    - port: 8000
