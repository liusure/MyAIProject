apiVersion: v1
kind: Pod
metadata:
  name: redis
  namespace: course-select
  labels:
    app: redis
spec:
  containers:
    - name: redis
      image: redis:7-alpine
      ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: course-select
spec:
  selector:
    app: redis
  ports:
    - port: 6379
