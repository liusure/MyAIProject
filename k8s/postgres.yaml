apiVersion: v1
kind: Pod
metadata:
  name: postgres
  namespace: course-select
  labels:
    app: postgres
spec:
  containers:
    - name: postgres
      image: postgres:16-alpine
      env:
        - name: POSTGRES_DB
          value: course_select
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
      ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: course-select
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
